<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School</title>
    <link href="mektep.png">
    <style>
        button{
            background-color:  hsl(212, 86%, 56%);
            color: white;
            transition-duration: 1s;
            border: none;
            border-radius: 3px;
        }
        button:hover{
            background-color:  hsl(212, 86%, 56%);
            transition-duration: 1s;  
        }
        .button1{
            background-color:  hsl(229, 86%, 56%);
            border: none;
            transition-duration: 1s;
            border-radius: 3px;
            font-family: sans-serif;
            font-size: 15px;
            color: white;
            box-shadow: 5px 3px;
        }
        .button1:hover{
            background-color:  hsl(212, 86%, 56%);
            transition-duration: 1s;
        }
        p{
            background-color: hsl(229, 86%, 56%);
            color: white;
            padding: 15px 17px;
            border-radius: 5px;
            
        }
    </style>
</head>
<body>
    <p>Klasslar</p>
    <button class="button">Baslawish klasslar</button>
    <button class="button">Joqari klasslar</button>
    <br>
    <hr>
    <p>Mektep haqqinda</p>
    <button class=".button1">Toligiraq</button>
    <button class=".button1">Qisqasha</button>
</body>
</html>
